outreach_rules:
  always:
    - Reference a specific detail from the target page or query (proves you actually read it)
    - Lead with what's useful to them, not what's useful to us
    - Include one specific Treetop URL that's directly relevant
    - Keep under 200 words for cold outreach; under 80 for comments
    - End with a low-friction next step (no "schedule a call" in first contact)
    - Sign with Bill's name and one-line bio
  never:
    - Use templated openers like "I came across your blog"
    - Pitch services unprompted in first message
    - Claim partnerships or client wins we don't have
    - Promise specific outcomes ("guaranteed 30% increase")
    - Send to abuse@ or general info@ when a named editor is findable
    - Send the same outreach twice (the skill's job is to track this)

constraints:
  monthly_outreach_budget: 30
  # Soft cap on volume per month. Quality > quantity. If we hit 30 sent outreaches in a month,
  # the next digest should focus on optimizing what's already in flight, not more cold outreach.
  domains_to_skip:
    - "*.medium.com"
    - "*.substack.com"
    - "linkedin.com/pulse/*"
    # These platforms don't pass link equity meaningfully; only worth engaging for brand reasons.
