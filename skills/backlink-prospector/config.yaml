# Treetop Growth Strategy — backlink prospector config
# Loaded by SKILL.md at the start of every run. Update this file as positioning evolves.

company:
  name: Treetop Growth Strategy
  url: https://treetopgrowthstrategy.com
  founded: 2023
  location: Austin, TX
  one_liner: "AI-native go-to-market consultancy for B2B mid-market ($5M-$50M)."
  positioning: |
    Treetop helps B2B mid-market companies between $5M and $50M ARR roll out Claude
    and AI productivity tools, hire fractional CMOs and CROs, and rebuild their GTM
    motion for the AI era. Opinionated, builder-profile, execution-focused — not a
    deck-and-leave consultancy.
  services:
    - AI Audit ($1,500 fixed fee, 5-day written roadmap)
    - AI Implementation (fixed-fee, 4-8 weeks, 1-3 production workflows)
    - Monthly Retainer (ongoing partnership after implementation)
    - Fractional CMO ($8K-$25K/month, B2B mid-market)
    - Fractional CRO (cross-functional revenue leadership)
    - Claude Training (workflow-specific team training)

founder:
  name: Bill Colbert
  title: Founder, Treetop Growth Strategy
  email: bill@treetopgrowthstrategy.com
  linkedin: https://linkedin.com/in/williamcolbert
  calendar: https://calendar.app.google/GS5H5y8U3PrN8u4A8
  bio_short: |
    Bill Colbert founded Treetop in 2023 after 15+ years building and scaling B2B
    revenue functions. He works with mid-market CEOs on AI rollout, fractional
    marketing and revenue leadership, and the GTM systems that compound.
  expertise:
    - AI implementation at B2B mid-market scale
    - Fractional CMO / CRO work
    - Claude Projects and prompt engineering in production
    - B2B SaaS marketing motions
    - Revenue operations for $5M-$50M companies
    - AI rollout governance and policy
    - AI vendor evaluation
  topics_to_pitch:
    - "How to roll out AI at a 30-person company without committee paralysis"
    - "What's actually working in B2B sales AI in 2026 (and what isn't)"
    - "Why most AI implementations stall in the first 30 days"
    - "The hidden cost of fractional CMO turnover"
    - "AI policy for mid-market: the one-page version"
    - "Claude vs ChatGPT for business in 2026"
    - "How to measure AI ROI honestly"

target_audience:
  primary: B2B CEOs and founders at $5M-$50M ARR
  secondary: COOs, CMOs, fractional executive talent
  industries:
    - B2B SaaS
    - Professional services (agencies, consultancies, law, accounting)
    - Healthcare (private practices, ambulatory)
    - Financial services (advisory, wealth, brokerage)
    - Manufacturing (mid-market industrials)
    - Real estate (brokerages, property management)

tone:
  voice: |
    Direct. Evidence-forward. Not consultant-speak. Specific over generic.
    Opinionated where opinion is earned; humble where it isn't. Confident without
    bravado. Acknowledges difficulty and tradeoffs rather than hiding them.
  forbidden_phrases:
    - "thrilled to"
    - "pleased to announce"
    - "industry-leading"
    - "cutting-edge"
    - "revolutionize"
    - "game-changing"
    - "best-in-class"
    - "world-class"
    - "synergies"
    - "thought leader"
    - "low-hanging fruit"
  prefers:
    - active voice
    - short declarative sentences
    - specific numbers over vague claims
    - "I" and "we" over passive third-person
    - calling out when something doesn't apply or won't work

