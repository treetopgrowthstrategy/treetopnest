name: Gym Intelligence — Weekly Scan

on:
  schedule:
    # 07:00 UTC every Sunday → 02:00 EST / 03:00 EDT
    - cron: "0 7 * * 0"
  workflow_dispatch:
    inputs:
      market:
        description: "Specific market to run (leave blank for next-in-rotation)"
        required: false
        default: ""
      mode:
        description: "Run mode"
        required: false
        default: "next"
        type: choice
        options:
          - next
          - all
          - enrich-only
      max_per_market:
        description: "Cap new gyms per market (blank = no cap)"
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: gym-weekly-scan
  cancel-in-progress: false

defaults:
  run:
    working-directory: gym-intelligence

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: gym-intelligence/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          ANTHROPIC_API_KEY:     ${{ secrets.ANTHROPIC_API_KEY }}
          AIRTABLE_PAT:          ${{ secrets.AIRTABLE_PAT }}
        run: |
          ARGS=""
          case "${{ github.event.inputs.mode }}" in
            all)          ARGS="--all-markets" ;;
            enrich-only)  ARGS="--enrich-only" ;;
            *)            if [ -n "${{ github.event.inputs.market }}" ]; then
                            ARGS="--market \"${{ github.event.inputs.market }}\""
                          fi
                          ;;
          esac
          if [ -n "${{ github.event.inputs.max_per_market }}" ]; then
            ARGS="$ARGS --max-per-market ${{ github.event.inputs.max_per_market }}"
          fi
          eval python main.py $ARGS

      - name: Upload log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gym_scraper-log-${{ github.run_id }}
          path: gym-intelligence/gym_scraper.log*
          if-no-files-found: ignore
          retention-days: 30
